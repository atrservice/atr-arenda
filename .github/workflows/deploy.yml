name: Deploy to reg.cloud

on:
  push:
    branches:
      - main  # Запускать только при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Перейди в папку проекта
            cd /var/www/atr-arenda
            
            # Получи последние изменения из Git
            git pull origin main
            
            # Установи зависимости (включая dev для сборки)
            npm install
            
            # Собери проект
            npm run build
            
            # Перезапусти приложение через PM2
            pm2 restart atr-arenda
            
            # Покажи статус
            pm2 status
            
            echo "✅ Деплой завершён успешно!"